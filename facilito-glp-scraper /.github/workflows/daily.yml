name: Extraer Precio GLP Facilito (Diario)

on:
  schedule:
    # 07:00 hora Lima = 12:00 UTC (Perú es UTC-5, sin DST)
    - cron: '0 12 * * *'
  workflow_dispatch:  # permite ejecutarlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chromium para Playwright
        run: python -m playwright install --with-deps chromium

      - name: Ejecutar scraper
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SP_SITE_HOST:        ${{ secrets.SP_SITE_HOST }}
          SP_SITE_PATH:        ${{ secrets.SP_SITE_PATH }}
          SP_FILE_PATH:        ${{ secrets.SP_FILE_PATH }}
        run: python scrape_facilito.py

      - name: Subir screenshot de error (si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error_debug.png
          if-no-files-found: ignore
          retention-days: 14
