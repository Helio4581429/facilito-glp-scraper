name: Extraer Precio GLP Automotor

on:
  schedule:
    - cron: '5 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper automotor
        run: python scrape_automotor.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add precios_automotor.csv
          if git diff --staged --quiet; then
            echo "No hay cambios para commit"
          else
            git commit -m "Update precios automotor $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files-automotor
          path: |
            error_debug_automotor.png
            page_debug_automotor.html
          if-no-files-found: ignore
          retention-days: 14
