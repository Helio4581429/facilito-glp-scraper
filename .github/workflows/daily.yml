name: Extraer Precio GLP Facilito

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Grupo COMPARTIDO con automotor.yml: nunca corren a la vez -> no chocan al hacer push
concurrency:
  group: glp-scraper-commit
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scrape_facilito.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add precios.csv
          if git diff --cached --quiet; then
            echo "Sin cambios en precios.csv, nada que commitear"
            exit 0
          fi
          git commit -m "Update precios envasado $(date -u +'%Y-%m-%d %H:%M UTC')"
          n=0
          until git push; do
            n=$((n+1))
            if [ "$n" -ge 5 ]; then
              echo "Push fallo tras 5 intentos"
              exit 1
            fi
            echo "Push rechazado, integrando remoto e intentando de nuevo ($n)..."
            git pull --rebase origin main
            sleep 3
          done

      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            error_debug.png
            page_debug.html
          if-no-files-found: ignore
          retention-days: 14
