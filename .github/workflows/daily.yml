name: Extraer Precio GLP Facilito

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Evita que 2 runs del mismo workflow se ejecuten al mismo tiempo y choquen al hacer push
concurrency:
  group: scrape-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scrape_facilito.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add precios_automotor.csv
          if git diff --staged --quiet; then
            echo "No hay cambios para commit"
          else
            git commit -m "Update precios automotor $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "Push intento $i fallo, reintentando..."
              sleep 5
            done
          fi

          git commit -m "Update precios $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Reintenta hasta 5 veces con backoff exponencial si hay race condition
          MAX_ATTEMPTS=5
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Intento $ATTEMPT de $MAX_ATTEMPTS..."

            # Trae cambios remotos manteniendo nuestro commit encima
            git pull --rebase origin main || {
              echo "Pull --rebase fallo en intento $ATTEMPT"
              git rebase --abort 2>/dev/null || true
              sleep $((ATTEMPT * 5))
              ATTEMPT=$((ATTEMPT + 1))
              continue
            }

            # Intenta el push
            if git push origin main; then
              echo "Push exitoso en intento $ATTEMPT"
              exit 0
            else
              echo "Push fallo en intento $ATTEMPT - reintentando..."
              sleep $((ATTEMPT * 5))
              ATTEMPT=$((ATTEMPT + 1))
            fi
          done

          echo "Push fallo despues de $MAX_ATTEMPTS intentos"
          exit 1

      - name: Upload debug files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: |
            error_debug.png
            page_debug.html
          if-no-files-found: ignore
          retention-days: 14
